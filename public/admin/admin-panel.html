<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AURAH Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09080a;--bg2:#0f0d0f;--sf:#181620;--sf2:#1f1d28;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --gold:#c9a85c;--gold2:#e8c87a;--gbg:rgba(201,168,92,.12);
  --tx:#f0ece4;--tx2:rgba(240,236,228,.58);--tx3:rgba(240,236,228,.32);
  --green:#5cb87a;--grbg:rgba(92,184,122,.12);
  --red:#cc5f5f;--rdbg:rgba(204,95,95,.12);
  --blue:#5f9ecc;--blbg:rgba(95,158,204,.12);
  --sb:240px;
}
html,body{height:100%;overflow:hidden}
body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;display:flex}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(201,168,92,.2);border-radius:2px}
input,select,textarea,button{font-family:inherit;font-size:14px}

.sidebar{width:var(--sb);min-width:var(--sb);background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:200}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-logo-name{font-size:20px;letter-spacing:.18em;color:var(--tx);font-weight:600}
.sb-logo-tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;background:var(--gbg);color:var(--gold);padding:2px 7px;border-radius:2px;font-weight:700}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;border-left:2px solid transparent;color:var(--tx2);font-size:13px;transition:all .15s}
.sb-item:hover{color:var(--tx);background:rgba(255,255,255,.03)}
.sb-item.on{color:var(--gold);border-left-color:var(--gold);background:var(--gbg)}
.sb-item svg{width:15px;height:15px;flex-shrink:0;stroke-width:1.8}
.sb-badge{margin-left:auto;background:var(--gold);color:#09080a;border-radius:999px;padding:1px 7px;font-size:9px;font-weight:700}
.sb-foot{padding:14px 16px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.sb-live{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1px solid rgba(201,168,92,.3);color:var(--gold);font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:transparent;width:100%;transition:all .2s}
.sb-live:hover{background:var(--gbg)}
.sb-out{background:none;border:1px solid var(--bd);color:var(--tx3);font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;padding:8px;width:100%;transition:all .2s}
.sb-out:hover{color:var(--red);border-color:rgba(204,95,95,.4)}

.main{margin-left:var(--sb);flex:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600}
.tb-meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--tx3)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.content{flex:1;overflow-y:auto;padding:22px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:18px;position:relative;overflow:hidden;cursor:default}
.stat::after{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.stat.gold::after{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.stat.green::after{background:var(--green)}
.stat.red::after{background:var(--red)}
.stat.blue::after{background:var(--blue)}
.stat-ico{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:14px}
.stat-ico.g{background:var(--gbg)}.stat-ico.gr{background:var(--grbg)}.stat-ico.r{background:var(--rdbg)}.stat-ico.b{background:var(--blbg)}
.stat-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);font-weight:600;margin-bottom:4px}
.stat-num{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px}
.stat-num.gold{color:var(--gold)}.stat-num.green{color:var(--green)}.stat-num.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--tx3)}

.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:18px}
.csm{background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:12px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ct{font-size:13px;font-weight:600}
.cs{font-size:11px;color:var(--tx3);margin-top:1px}

.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.cr{cursor:pointer}
tr.cr:hover td{background:rgba(255,255,255,.02)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:none;transition:all .18s;font-weight:600;border-radius:4px;white-space:nowrap}
.btn-g{background:var(--gold);color:#09080a}.btn-g:hover{background:var(--gold2)}
.btn-o{background:transparent;border:1px solid var(--bd2);color:var(--tx)}.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.btn-d{background:transparent;border:1px solid rgba(204,95,95,.25);color:var(--red)}.btn-d:hover{background:var(--rdbg)}
.btn-sm{padding:5px 11px;font-size:10px}
.bi{background:transparent;border:1px solid var(--bd);color:var(--tx2);padding:5px 8px;cursor:pointer;transition:all .18s;border-radius:3px;display:inline-flex;align-items:center;gap:4px;font-size:12px}
.bi:hover{border-color:var(--gold);color:var(--gold)}
.bi-r{border-color:rgba(204,95,95,.25);color:var(--red)}.bi-r:hover{background:var(--rdbg)}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fg.nm{margin-bottom:0}
.fg label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);font-weight:500}
.fg input,.fg select,.fg textarea{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:9px 12px;outline:none;width:100%;transition:border .15s;border-radius:3px}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:rgba(201,168,92,.5)}
.fg textarea{resize:vertical;min-height:76px}
.fg select option{background:#151318}
.fg input[type=color]{padding:3px;height:36px;cursor:pointer}
.fg input[type=range]{padding:0;height:auto;background:transparent;border:none;accent-color:var(--gold)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.f4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.fhint{font-size:10px;color:var(--tx3);margin-top:3px}
.fhint.ok{color:var(--green)}.fhint.warn{color:var(--gold)}.fhint.bad{color:var(--red)}

.tags{display:flex;flex-wrap:wrap;gap:6px;min-height:26px;margin-bottom:8px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--sf2);border:1px solid var(--bd);font-size:11px;border-radius:3px}
.tdel{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:15px;line-height:1;padding:0;transition:color .15s}
.tdel:hover{color:var(--red)}
.ar{display:flex;gap:6px;align-items:center}
.ar input{flex:1}

.ig{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.ic{position:relative;aspect-ratio:3/4;border-radius:4px;overflow:hidden;background:var(--sf2);border:1px solid var(--bd)}
.ic img{width:100%;height:100%;object-fit:cover}
.ic .ml{position:absolute;bottom:0;left:0;right:0;background:rgba(201,168,92,.92);color:#09080a;font-size:7px;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:3px;font-weight:700}
.ic .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#fff;width:18px;height:18px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;padding:0}
.ic:hover .rm{opacity:1}
.iph{display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:var(--tx3);padding:6px;text-align:center;word-break:break-all}
.iup{aspect-ratio:3/4;border:1px dashed var(--bd2);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .2s}
.iup:hover{border-color:var(--gold);background:var(--gbg)}
.iup input{position:absolute;inset:0;opacity:0;cursor:pointer}
.iup svg{width:20px;height:20px;color:var(--tx3);margin-bottom:5px}
.iup span{font-size:9px;color:var(--tx3);text-align:center;line-height:1.4}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:10px;width:100%;max-width:760px;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.7)}
.modal.sm{max-width:420px}
.mh{padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.mt{font-size:15px;font-weight:600}
.mb{padding:22px;overflow-y:auto;flex:1}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.xb{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:22px;line-height:1;display:flex;padding:2px;transition:color .15s}
.xb:hover{color:var(--tx)}

.badge{display:inline-block;padding:2px 8px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;border-radius:2px}
.bg{background:var(--gbg);color:var(--gold)}.bgn{background:var(--grbg);color:var(--green)}
.br{background:var(--rdbg);color:var(--red)}.bb{background:var(--blbg);color:var(--blue)}
.bgr{background:rgba(255,255,255,.06);color:var(--tx2)}

.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;gap:2px}
.tab{padding:8px 14px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;color:var(--tx3);transition:all .15s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--tx)}

.sw{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.swt{position:absolute;cursor:pointer;inset:0;background:rgba(255,255,255,.1);border-radius:21px;transition:.2s}
.swt::before{position:absolute;content:"";height:15px;width:15px;left:3px;bottom:3px;background:#555;border-radius:50%;transition:.2s}
.sw input:checked+.swt{background:rgba(201,168,92,.8)}
.sw input:checked+.swt::before{transform:translateX(17px);background:#09080a}

.hr{border:none;border-top:1px solid var(--bd);margin:18px 0}
.hrl{display:flex;align-items:center;gap:10px;margin:18px 0}
.hrl::before,.hrl::after{content:"";flex:1;border-top:1px solid var(--bd)}
.hrl span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);font-weight:600}

.pt{height:4px;background:var(--sf2);border-radius:2px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:2px;transition:width .7s ease}

.sb{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:7px 12px;outline:none;border-radius:4px;font-size:12px;width:220px;transition:border .15s}
.sb:focus{border-color:rgba(201,168,92,.4)}
.sb::placeholder{color:var(--tx3)}

.sh{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
.stit{font-size:17px;font-weight:600}
.ssub{font-size:11px;color:var(--tx3);margin-top:2px}
.fb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}

.toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--sf2);border:1px solid var(--bd2);padding:11px 15px;font-size:13px;min-width:210px;border-radius:5px;pointer-events:all;animation:tIn .2s ease}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--gold)}

.lw{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.lc{background:var(--sf);border:1px solid var(--bd2);padding:44px;width:100%;max-width:400px;border-radius:12px}

.empty{text-align:center;padding:50px 20px;color:var(--tx3)}
.eico{font-size:30px;margin-bottom:10px}

.ot{display:flex;margin-bottom:20px}
.ots{flex:1;text-align:center;position:relative}
.ots::before{content:"";position:absolute;top:13px;left:50%;right:-50%;height:2px;background:var(--bd);z-index:0}
.ots:last-child::before{display:none}
.otd{width:28px;height:28px;border-radius:50%;border:2px solid var(--bd);background:var(--sf2);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:10px;color:var(--tx3);position:relative;z-index:1}
.otd.done{background:var(--gold);border-color:var(--gold);color:#09080a}
.otd.act{border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,92,.2)}
.otl{font-size:9px;text-transform:capitalize;color:var(--tx3)}
.otl.done,.otl.act{color:var(--gold)}
.csw{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,.15);display:inline-block;vertical-align:middle;margin-right:4px}

.rb{height:8px;border-radius:4px;background:var(--sf2);overflow:hidden;margin-top:4px}
.rf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.rfg{background:var(--green)}

@media(max-width:900px){
  :root{--sb:0px}
  .sidebar{transform:translateX(-240px);width:240px}
  .main{margin-left:0}
  .stats{grid-template-columns:1fr 1fr}
  .f2,.f3,.f4{grid-template-columns:1fr}
  .ig{grid-template-columns:repeat(3,1fr)}
}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<div class="toasts" id="toasts"></div>
<script>
"use strict";
let TK=localStorage.getItem("adk")||"";
const A={
  g:p=>fetch("/api/admin"+p,{headers:{"X-Admin-Token":TK}}).then(r=>{if(!r.ok)throw r;return r.json()}),
  po:(p,b)=>fetch("/api/admin"+p,{method:"POST",headers:{"Content-Type":"application/json","X-Admin-Token":TK},body:JSON.stringify(b)}).then(r=>{if(!r.ok)throw r;return r.json()}),
  pu:(p,b)=>fetch("/api/admin"+p,{method:"PUT",headers:{"Content-Type":"application/json","X-Admin-Token":TK},body:JSON.stringify(b)}).then(r=>{if(!r.ok)throw r;return r.json()}),
  de:p=>fetch("/api/admin"+p,{method:"DELETE",headers:{"X-Admin-Token":TK}}).then(r=>{if(!r.ok)throw r;return r.json()}),
  up:file=>{const f=new FormData();f.append("image",file);return fetch("/api/admin/upload",{method:"POST",headers:{"X-Admin-Token":TK},body:f}).then(r=>r.json())}
};
function toast(msg,t="ok"){const d=document.createElement("div");d.className="toast "+t;d.textContent=msg;document.getElementById("toasts").appendChild(d);setTimeout(()=>d.remove(),3400)}
const S={auth:!!TK,page:"dashboard",products:[],categories:[],orders:[],settings:{},homepage:{},modal:null,ordTab:"all",prodCat:"all",prodQ:""};
async function loadAll(){
  try{
    const[pr,ca,or,se,hp]=await Promise.all([A.g("/products"),A.g("/categories"),A.g("/orders"),fetch("/api/settings").then(r=>r.json()).catch(()=>({})),fetch("/api/homepage").then(r=>r.json()).catch(()=>({}))]);
    S.products=pr;S.categories=ca;S.orders=or;S.settings=se;S.homepage=hp;render();
  }catch(e){toast("Failed to load data","err")}
}
const IC={
  dash:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><rect x='3' y='3' width='7' height='7' rx='1'/><rect x='14' y='3' width='7' height='7' rx='1'/><rect x='3' y='14' width='7' height='7' rx='1'/><rect x='14' y='14' width='7' height='7' rx='1'/></svg>",
  rev:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><polyline points='23 6 13.5 15.5 8.5 10.5 1 18'/><polyline points='17 6 23 6 23 12'/></svg>",
  box:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z'/><polyline points='3.27 6.96 12 12.01 20.73 6.96'/><line x1='12' y1='22.08' x2='12' y2='12'/></svg>",
  cat:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><line x1='8' y1='6' x2='21' y2='6'/><line x1='8' y1='12' x2='21' y2='12'/><line x1='8' y1='18' x2='21' y2='18'/><circle cx='3' cy='6' r='1'/><circle cx='3' cy='12' r='1'/><circle cx='3' cy='18' r='1'/></svg>",
  ord:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z'/><line x1='3' y1='6' x2='21' y2='6'/><path d='M16 10a4 4 0 01-8 0'/></svg>",
  home:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z'/><polyline points='9 22 9 12 15 12 15 22'/></svg>",
  set:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><circle cx='12' cy='12' r='3'/><path d='M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z'/></svg>",
  plus:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><line x1='12' y1='5' x2='12' y2='19'/><line x1='5' y1='12' x2='19' y2='12'/></svg>",
  ed:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7'/><path d='M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z'/></svg>",
  tr:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><polyline points='3 6 5 6 21 6'/><path d='M19 6l-1 14H6L5 6'/><path d='M10 11v6'/><path d='M14 11v6'/><path d='M9 6V4h6v2'/></svg>",
  eye:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg>",
  upl:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor'><polyline points='16 16 12 12 8 16'/><line x1='12' y1='12' x2='12' y2='21'/><path d='M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3'/></svg>"
};
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const $=id=>document.getElementById(id);
const $$=sel=>[...document.querySelectorAll(sel)];
const fmt=n=>Number(n||0).toLocaleString();
const fmtD=s=>new Date(s).toLocaleDateString("en",{year:"numeric",month:"short",day:"numeric"});
const fmtDT=s=>new Date(s).toLocaleString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
const mg=(sell,cost)=>sell>0&&cost>=0?Math.round((sell-cost)/sell*100):null;
const mc=m=>m===null?"var(--tx3)":m>=40?"var(--green)":m>=20?"var(--gold)":"var(--red)";
const sb=s=>({pending:"bg",processing:"bb",shipped:"bb",delivered:"bgn",cancelled:"br"}[s]||"bgr");

function render(){
  const root=$("root");if(!root)return;
  if(!S.auth){root.innerHTML=tLogin();$("tkin")&&$("tkin").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});return}
  root.innerHTML=`<div class="sidebar" id="sb">${tSidebar()}</div><div class="main"><div class="topbar">${tTopbar()}</div><div class="content" id="cnt">${tPage()}</div></div>${S.modal?tModal():""}`;
  bindKeys();
}
function rp(){const c=$("cnt");if(c)c.innerHTML=tPage();bindKeys()}

function tLogin(){
  return `<div class="lw"><div class="lc">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:28px;letter-spacing:.2em;font-weight:600;margin-bottom:6px">AURAH</div>
      <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)">Admin Panel</div>
    </div>
    <div class="fg"><label>Admin Token</label><input id="tkin" type="password" placeholder="Enter your admin token" style="font-family:monospace;letter-spacing:.06em"/></div>
    <button class="btn btn-g" style="width:100%;margin-top:4px" onclick="doLogin()">Access Dashboard</button>
    <p style="margin-top:18px;font-size:11px;color:var(--tx3);text-align:center;line-height:1.7">Default: <code style="background:var(--sf2);padding:1px 6px;border-radius:3px">aurah-admin-secret-2026</code><br/>Set <code style="background:var(--sf2);padding:1px 6px;border-radius:3px">ADMIN_TOKEN</code> env var to change</p>
  </div></div>`;
}
async function doLogin(){
  const tk=$("tkin")?.value?.trim();if(!tk)return;
  try{
    const r=await fetch("/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:tk})});
    if(r.ok){TK=tk;localStorage.setItem("adk",tk);S.auth=true;toast("Welcome back!");await loadAll();}
    else toast("Invalid token","err");
  }catch(e){toast("Connection error","err")}
}
function doLogout(){TK="";localStorage.removeItem("adk");S.auth=false;render()}

function tSidebar(){
  const pending=S.orders.filter(o=>o.status==="pending").length;
  const nav=[{id:"dashboard",ic:IC.dash,lb:"Dashboard"},{id:"revenue",ic:IC.rev,lb:"Revenue & Profit"},{id:"products",ic:IC.box,lb:"Products"},{id:"categories",ic:IC.cat,lb:"Categories"},{id:"orders",ic:IC.ord,lb:"Orders",badge:pending},{id:"homepage",ic:IC.home,lb:"Homepage Editor"},{id:"settings",ic:IC.set,lb:"Settings"}];
  return `<div class="sb-logo"><div class="sb-logo-name">AURAH</div><div class="sb-logo-tag">Admin</div></div>
    <nav class="sb-nav">${nav.map(n=>`<div class="sb-item${S.page===n.id?" on":""}" onclick="goTo('${n.id}')">${n.ic}<span>${n.lb}</span>${n.badge?`<span class="sb-badge">${n.badge}</span>`:""}</div>`).join("")}</nav>
    <div class="sb-foot">
      <button class="sb-live" onclick="window.open('/','_blank')">&#8599; View Live Store</button>
      <button class="sb-out" onclick="doLogout()">Sign Out</button>
    </div>`;
}
function tTopbar(){
  const tr=S.orders.reduce((s,o)=>s+(o.total||0),0);
  const titles={dashboard:"Dashboard",revenue:"Revenue & Profit",products:"Products",categories:"Categories",orders:"Orders",homepage:"Homepage Editor",settings:"Store Settings"};
  return `<div class="tb-title">${titles[S.page]||""}</div>
    <div class="tb-meta"><span><span class="live-dot"></span>Live</span><span>${S.products.length} products</span><span>${S.orders.length} orders</span><span style="color:var(--gold);font-weight:600">$${fmt(tr)} revenue</span></div>`;
}
function tPage(){switch(S.page){case"dashboard":return tDash();case"revenue":return tRev();case"products":return tProds();case"categories":return tCats();case"orders":return tOrds();case"homepage":return tHP();case"settings":return tSet();default:return tDash()}}
function goTo(p){S.page=p;render()}

function tDash(){
  const tr=S.orders.reduce((s,o)=>s+(o.total||0),0),tc=S.orders.reduce((s,o)=>s+(o.totalCost||0),0),tp=tr-tc;
  const pend=S.orders.filter(o=>o.status==="pending"),del=S.orders.filter(o=>o.status==="delivered");
  const pct=tr>0?(tp/tr*100).toFixed(1):0;
  const rec=[...S.orders].slice(0,8);
  return `
  <div class="stats">
    <div class="stat gold" style="cursor:pointer" onclick="goTo('revenue')"><div class="stat-ico g">&#128176;</div><div class="stat-lbl">Total Revenue</div><div class="stat-num gold">$${fmt(tr)}</div><div class="stat-sub">${S.orders.length} orders</div></div>
    <div class="stat green" style="cursor:pointer" onclick="goTo('revenue')"><div class="stat-ico gr">&#128200;</div><div class="stat-lbl">Net Profit</div><div class="stat-num green">$${fmt(tp)}</div><div class="stat-sub">${pct}% margin</div></div>
    <div class="stat blue"><div class="stat-ico b">&#128230;</div><div class="stat-lbl">Products</div><div class="stat-num">${S.products.length}</div><div class="stat-sub">${S.products.filter(p=>p.featured).length} featured</div></div>
    <div class="stat red" style="cursor:pointer" onclick="goTo('orders')"><div class="stat-ico r">&#128276;</div><div class="stat-lbl">Pending Orders</div><div class="stat-num" style="color:var(--gold)">${pend.length}</div><div class="stat-sub">${del.length} delivered</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start">
    <div class="card">
      <div class="ch"><div><div class="ct">Recent Orders</div><div class="cs">Click any row to view details</div></div><button class="btn btn-o btn-sm" onclick="goTo('orders')">View All</button></div>
      <div class="tw">${rec.length===0?`<div class="empty"><div class="eico">&#128217;</div><p>No orders yet</p></div>`:`
      <table><thead><tr><th>Order</th><th>Customer</th><th>Revenue</th><th>Profit</th><th>Status</th><th>Date</th></tr></thead>
      <tbody>${rec.map(o=>{const p=(o.total||0)-(o.totalCost||0);return`<tr class="cr" onclick="openOrdModal('${o.id}')">
        <td><span style="font-family:monospace;font-size:11px;color:var(--gold)">${o.id}</span></td>
        <td style="font-weight:500">${o.firstName||""} ${o.lastName||""}</td>
        <td style="font-weight:700;color:var(--gold)">$${fmt(o.total)}</td>
        <td style="font-weight:600;color:${o.totalCost&&p>=0?"var(--green)":"var(--tx3)"}">${o.totalCost?(p>=0?"+":"")+` $${fmt(p)}`:"—"}</td>
        <td><span class="badge ${sb(o.status)}">${o.status||"pending"}</span></td>
        <td style="font-size:11px;color:var(--tx3)">${fmtD(o.createdAt)}</td>
      </tr>`}).join("")}</tbody></table>`}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="card">
        <div class="ct" style="margin-bottom:14px">Profit Snapshot</div>
        ${[{l:"Gross Revenue",v:"$"+fmt(tr),c:"var(--gold)"},{l:"Cost of Goods",v:tc?"$"+fmt(tc):"Not tracked",c:"var(--red)"},{l:"Net Profit",v:"$"+fmt(tp),c:tp>=0?"var(--green)":"var(--red)",b:true},{l:"Margin",v:pct+"%",c:parseFloat(pct)>=30?"var(--green)":parseFloat(pct)>=15?"var(--gold)":"var(--red)"}]
        .map(r=>`<div style="display:flex;justify-content:space-between;padding:8px 10px;background:var(--sf2);border-radius:4px;margin-bottom:6px"><span style="font-size:12px;color:var(--tx2)">${r.l}</span><span style="font-size:13px;font-weight:${r.b?700:500};color:${r.c}">${r.v}</span></div>`).join("")}
        <button class="btn btn-o btn-sm" style="width:100%;margin-top:6px" onclick="goTo('revenue')">Full Revenue Report</button>
      </div>
      <div class="card">
        <div class="ct" style="margin-bottom:12px">Featured Products</div>
        ${S.products.filter(p=>p.featured).slice(0,5).map(p=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer" onclick="openProdModal(${p.id})">
          <div style="width:36px;height:48px;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center">
            ${p.images&&p.images[0]&&p.images[0].startsWith("/")?`<img src="${esc(p.images[0])}" style="width:100%;height:100%;object-fit:cover"/>`:`<span style="font-size:8px;color:var(--tx3)">${esc(p.name).slice(0,3)}</span>`}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</div>
            <div style="font-size:10px;color:var(--gold)">$${p.price}${p.costPrice?` &middot; Cost $${p.costPrice}`:""}</div>
          </div>
          ${mg(p.price,p.costPrice)!==null?`<span style="font-size:11px;font-weight:700;color:${mc(mg(p.price,p.costPrice))}">${mg(p.price,p.costPrice)}%</span>`:""}
        </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function tRev(){
  const orders=S.orders;
  const tr=orders.reduce((s,o)=>s+(o.total||0),0),tc=orders.reduce((s,o)=>s+(o.totalCost||0),0),tp=tr-tc;
  const pct=tr>0?(tp/tr*100).toFixed(1):0,avg=orders.length?Math.round(tr/orders.length):0;
  const monthly={};
  orders.forEach(o=>{const k=new Date(o.createdAt).toLocaleDateString("en",{year:"numeric",month:"short"});if(!monthly[k])monthly[k]={rev:0,cost:0,cnt:0};monthly[k].rev+=(o.total||0);monthly[k].cost+=(o.totalCost||0);monthly[k].cnt++});
  const months=Object.entries(monthly).slice(-6);
  const maxR=Math.max(...months.map(([,v])=>v.rev),1);
  const byP=S.products.map(p=>{let u=0,r=0;orders.forEach(o=>(o.items||[]).forEach(i=>{if(i.id===p.id){u+=i.qty;r+=i.price*i.qty;}}));const c=(p.costPrice||0)*u,pr=r-c,pm=r>0?(pr/r*100).toFixed(1):0;return{p,u,r,c,pr,pm}}).filter(x=>x.r>0).sort((a,b)=>b.pr-a.pr);
  return `
  <div class="stats">
    <div class="stat gold"><div class="stat-ico g">&#128181;</div><div class="stat-lbl">Total Revenue</div><div class="stat-num gold">$${fmt(tr)}</div><div class="stat-sub">${orders.length} orders</div></div>
    <div class="stat red"><div class="stat-ico r">&#127981;</div><div class="stat-lbl">Total Cost</div><div class="stat-num red">$${fmt(tc)}</div><div class="stat-sub">Cost of goods sold</div></div>
    <div class="stat green"><div class="stat-ico gr">&#128200;</div><div class="stat-lbl">Net Profit</div><div class="stat-num green">$${fmt(tp)}</div><div class="stat-sub">${pct}% margin</div></div>
    <div class="stat blue"><div class="stat-ico b">&#128717;</div><div class="stat-lbl">Avg Order Value</div><div class="stat-num">$${fmt(avg)}</div><div class="stat-sub">per order</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="ct" style="margin-bottom:16px">Monthly Revenue vs Profit</div>
      ${months.length===0?`<div class="empty"><div class="eico">&#128202;</div><p>No orders yet</p></div>`:
      months.map(([mo,v])=>{const pr=v.rev-v.cost,rw=Math.round(v.rev/maxR*100),pw=v.rev>0?Math.round(pr/v.rev*rw):0;
      return`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
          <span style="color:var(--tx2);font-weight:500">${mo}</span><span style="color:var(--tx3)">${v.cnt} orders</span>
          <span style="color:var(--gold)">$${fmt(v.rev)}</span><span style="color:${pr>=0?"var(--green)":"var(--red)"}">${pr>=0?"+":""}$${fmt(pr)}</span>
        </div>
        <div class="rb"><div class="rf" style="width:${rw}%"></div></div>
        <div class="rb" style="margin-top:3px"><div class="rf rfg" style="width:${Math.max(0,pw)}%"></div></div>
      </div>`}).join("")}
      <div style="display:flex;gap:16px;margin-top:10px;font-size:10px;color:var(--tx3)">
        <span><span style="display:inline-block;width:12px;height:4px;background:var(--gold);margin-right:4px;vertical-align:middle;border-radius:2px"></span>Revenue</span>
        <span><span style="display:inline-block;width:12px;height:4px;background:var(--green);margin-right:4px;vertical-align:middle;border-radius:2px"></span>Profit</span>
      </div>
    </div>
    <div class="card">
      <div class="ct" style="margin-bottom:14px">Profit Breakdown</div>
      ${[{l:"Gross Revenue",v:"$"+fmt(tr),c:"var(--gold)"},{l:"Cost of Goods Sold",v:tc?"&#8722; $"+fmt(tc):"Not tracked",c:"var(--red)"},{l:"Net Profit",v:"$"+fmt(tp),c:tp>=0?"var(--green)":"var(--red)",b:true},{l:"Profit Margin",v:pct+"%",c:parseFloat(pct)>=30?"var(--green)":parseFloat(pct)>=15?"var(--gold)":"var(--red)"},{l:"Avg Order Value",v:"$"+fmt(avg),c:"var(--tx)"},{l:"Delivered",v:orders.filter(o=>o.status==="delivered").length+" orders",c:"var(--blue)"},{l:"Cancelled",v:orders.filter(o=>o.status==="cancelled").length+" orders",c:"var(--red)"}]
      .map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--sf2);border-radius:4px;margin-bottom:6px"><span style="font-size:12px;color:var(--tx2)">${r.l}</span><span style="font-size:13px;font-weight:${r.b?700:500};color:${r.c}">${r.v}</span></div>`).join("")}
    </div>
  </div>
  <div class="card">
    <div class="ch"><div><div class="ct">Product Profit Analysis</div><div class="cs">Set cost prices per product to see accurate margins</div></div><button class="btn btn-o btn-sm" onclick="goTo('products')">Edit Cost Prices</button></div>
    ${byP.length===0?`<div class="empty"><div class="eico">&#128230;</div><p>No sales data yet. Orders from your store will appear here.</p></div>`:`
    <div class="tw"><table>
      <thead><tr><th>Product</th><th>Units</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th><th>Bar</th></tr></thead>
      <tbody>${byP.map(({p,u,r,c,pr,pm})=>{const clr=parseFloat(pm)>=40?"var(--green)":parseFloat(pm)>=20?"var(--gold)":"var(--red)";return`<tr>
        <td><div style="font-weight:500">${esc(p.name)}</div><div style="font-size:10px;color:var(--tx3)">Sell $${p.price} &middot; Cost $${p.costPrice||`<span style='color:var(--red)'>not set</span>`}</div></td>
        <td>${u}</td><td style="font-weight:700;color:var(--gold)">$${fmt(r)}</td><td style="color:var(--red)">${c?"$"+fmt(c):"—"}</td>
        <td style="font-weight:700;color:${pr>=0?"var(--green)":"var(--red)"}">${pr>=0?"+":""}$${fmt(pr)}</td>
        <td style="font-weight:700;color:${clr}">${pm}%</td>
        <td style="width:90px"><div class="pt"><div class="pf" style="width:${Math.min(100,Math.max(0,pm))}%;background:${clr}"></div></div></td>
      </tr>`}).join("")}</tbody>
    </table></div>`}
  </div>`;
}

function tProds(){
  let list=S.products;
  if(S.prodCat!=="all")list=list.filter(p=>p.collection===S.prodCat);
  if(S.prodQ)list=list.filter(p=>p.name.toLowerCase().includes(S.prodQ.toLowerCase())||(p.subtitle||"").toLowerCase().includes(S.prodQ.toLowerCase()));
  return `
  <div class="sh"><div><div class="stit">Products</div><div class="ssub">${S.products.length} total &middot; ${S.products.filter(p=>p.featured).length} featured &middot; ${S.products.filter(p=>!p.costPrice).length} missing cost price</div></div>
    <button class="btn btn-g" onclick="openProdModal(null)">${IC.plus} Add Product</button></div>
  <div class="fb">
    <input class="sb" placeholder="&#128269; Search products..." value="${esc(S.prodQ)}" oninput="S.prodQ=this.value;rp()"/>
    <button class="btn btn-sm ${S.prodCat==="all"?"btn-g":"btn-o"}" onclick="S.prodCat='all';rp()">All (${S.products.length})</button>
    ${S.categories.map(c=>`<button class="btn btn-sm ${S.prodCat===c.id?"btn-g":"btn-o"}" onclick="S.prodCat='${c.id}';rp()">${esc(c.label)} (${S.products.filter(p=>p.collection===c.id).length})</button>`).join("")}
  </div>
  <div class="card" style="padding:0"><div class="tw"><table>
    <thead><tr><th>Image</th><th>Product</th><th>Category</th><th>Cost Price</th><th>Sell Price</th><th>Margin</th><th>Badge</th><th>Featured</th><th>Actions</th></tr></thead>
    <tbody>${list.length===0?`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--tx3)">No products found</td></tr>`:
    list.map(p=>{const m=mg(p.price,p.costPrice);return`<tr>
      <td style="padding:10px 14px"><div style="width:40px;height:54px;background:var(--sf2);border:1px solid var(--bd);border-radius:3px;overflow:hidden;display:flex;align-items:center;justify-content:center">
        ${p.images&&p.images[0]&&p.images[0].startsWith("/")?`<img src="${esc(p.images[0])}" style="width:100%;height:100%;object-fit:cover"/>`:`<span style="font-size:8px;color:var(--tx3)">${esc(p.name).slice(0,4)}</span>`}
      </div></td>
      <td><div style="font-weight:500">${esc(p.name)}</div><div style="font-size:10px;color:var(--tx3)">${esc(p.subtitle||"")}</div></td>
      <td><span style="background:var(--sf2);border:1px solid var(--bd);padding:2px 8px;font-size:10px;border-radius:2px">${esc(p.collection)}</span></td>
      <td>${p.costPrice?`<span style="color:var(--red);font-weight:500">$${p.costPrice}</span>`:`<span style="color:var(--tx3);font-size:10px">&#9888; Not set</span>`}</td>
      <td><span style="font-weight:700;color:var(--gold)">$${p.price}</span>${p.originalPrice?`<span style="text-decoration:line-through;font-size:10px;color:var(--tx3);margin-left:4px">$${p.originalPrice}</span>`:""}</td>
      <td>${m!==null?`<span style="font-weight:700;color:${mc(m)}">${m}%</span>`:`<span style="color:var(--tx3)">—</span>`}</td>
      <td>${p.badge?`<span class="badge bg">${esc(p.badge)}</span>`:""}</td>
      <td><label class="sw"><input type="checkbox" ${p.featured?"checked":""} onchange="toggleFeat(${p.id},this.checked)"><span class="swt"></span></label></td>
      <td><div style="display:flex;gap:5px"><button class="bi" onclick="openProdModal(${p.id})">${IC.ed}</button><button class="bi bi-r" onclick="delProd(${p.id})">${IC.tr}</button></div></td>
    </tr>`}).join("")}</tbody>
  </table></div></div>`;
}

function tCats(){
  return `
  <div class="sh"><div><div class="stit">Categories</div><div class="ssub">Manage product collections</div></div><button class="btn btn-g" onclick="openCatModal(null)">${IC.plus} Add Category</button></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    ${S.categories.map(c=>{
      const cnt=S.products.filter(p=>p.collection===c.id).length;
      const rev=S.orders.reduce((s,o)=>s+(o.items||[]).filter(i=>S.products.find(p=>p.id===i.id&&p.collection===c.id)).reduce((a,i)=>a+i.price*i.qty,0),0);
      return`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
          <div><div style="font-size:16px;font-weight:600">${esc(c.label)}</div><div style="font-size:10px;color:var(--tx3);font-family:monospace;margin-top:2px">${c.id}</div></div>
          <div style="display:flex;gap:5px"><button class="bi" onclick="openCatModal('${c.id}')">${IC.ed}</button><button class="bi bi-r" onclick="delCat('${c.id}')">${IC.tr}</button></div>
        </div>
        <div style="display:flex;gap:20px">
          <div><div style="font-size:22px;font-weight:700;color:var(--gold)">${cnt}</div><div style="font-size:10px;color:var(--tx3)">Products</div></div>
          <div><div style="font-size:22px;font-weight:700;color:var(--green)">$${fmt(rev)}</div><div style="font-size:10px;color:var(--tx3)">Revenue</div></div>
        </div>
        <div class="pt" style="margin-top:12px"><div class="pf" style="width:${Math.min(100,cnt/Math.max(1,S.products.length)*100)}%;background:var(--gold)"></div></div>
      </div>`;
    }).join("")}
    ${S.categories.length===0?`<div class="card" style="text-align:center;padding:40px;color:var(--tx3);grid-column:1/-1">No categories yet</div>`:""}
  </div>`;
}

function tOrds(){
  const tabs=["all","pending","processing","shipped","delivered","cancelled"];
  const list=S.ordTab==="all"?S.orders:S.orders.filter(o=>o.status===S.ordTab);
  return `
  <div class="sh"><div><div class="stit">Orders</div><div class="ssub">${S.orders.length} total &middot; $${fmt(S.orders.reduce((s,o)=>s+(o.total||0),0))} revenue</div></div></div>
  <div class="tabs">${tabs.map(t=>`<div class="tab${S.ordTab===t?" on":""}" onclick="S.ordTab='${t}';rp()">${t==="all"?"All":t.charAt(0).toUpperCase()+t.slice(1)} (${t==="all"?S.orders.length:S.orders.filter(o=>o.status===t).length})</div>`).join("")}</div>
  <div class="card" style="padding:0">${list.length===0?`<div class="empty"><div class="eico">&#128217;</div><p>No orders in this status</p></div>`:`
  <div class="tw"><table>

function tOrdModal(ordId){

  return`<div class="mbg" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">

  <div class="mb">
    <div class="ot">${steps.map((step,i)=>{const done=i<si&&o.status!=="cancelled",act=i===si&&o.status!=="cancelled";
      return`<div class="ots${done?" done":act?" act":""}">
        <div class="otd${done?" done":act?" act":""}">${done?"&#10003;":i+1}</div>
        <div class="otl${done?" done":act?" act":""}">${step}</div>

        <div style="font-size:12px;color:var(--tx3);margin-top:8px;line-height:1.6">${o.address||""}<br/>${o.city||""} ${o.zip||""}</div>

        <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:8px;font-weight:600">Financials</div>
        ${[{l:"Revenue",v:"$"+fmt(o.total),c:"var(--gold)",b:true},{l:"Cost of Goods",v:o.totalCost?"$"+fmt(o.totalCost):"Not tracked",c:"var(--red)"},{l:"Profit",v:o.totalCost?(pr>=0?"+":"")+"$"+fmt(pr):"—",c:pr>=0?"var(--green)":"var(--red)",b:true}]
        .map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)"><span style="font-size:12px;color:var(--tx3)">${r.l}</span><span style="font-weight:${r.b?700:500};color:${r.c}">${r.v}</span></div>`).join("")}
      </div>
    </div>
    <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;font-weight:600">Items Ordered (${(o.items||[]).length})</div>

        </div>
        <div style="flex:1;min-width:0">

          </div>
        </div>
        <div style="text-align:right;flex-shrink:0"><div style="font-weight:700;color:var(--gold)">$${fmt(item.price*item.qty)}</div><div style="font-size:10px;color:var(--tx3)">$${item.price} each</div></div>

function openProdModal(id){const p=id?JSON.parse(JSON.stringify(S.products.find(x=>x.id===id)||{})):{};S.modal={type:"prod",data:p};render()}
function openCatModal(id){const c=id?JSON.parse(JSON.stringify(S.categories.find(x=>x.id===id)||{})):null;S.modal={type:"cat",data:c};render()}
function openOrdModal(id){S.modal={type:"ord",data:id};render()}
function closeModal(e){if(!e||e.target===e.currentTarget){S.modal=null;render()}}

function liveMg(){
  const cost=parseFloat($("pcost")?.value)||0,price=parseFloat($("pprice")?.value)||0;
  const mb=$("mgb"),mh=$("mgh");if(!mb)return;
  if(price>0){const m=Math.round((price-cost)/price*100);mb.textContent=m+"%";mb.style.color=mc(m);
    if(mh){mh.textContent=m>=40?"&#10003; Excellent":m>=30?"&#10003; Good":m>=15?"&#9888; Low margin":"&#10007; Very low";mh.className="fhint "+(m>=30?"ok":m>=15?"warn":"bad")}}
  else{mb.textContent="—";mb.style.color="var(--tx3)"}
}

function addTag(type){
  const p=S.modal?.data;if(!p)return;
  if(type==="sz"){const v=$("nsz")?.value?.trim();if(!v)return;if(!p.sizes)p.sizes=[];if(!p.sizes.includes(v))p.sizes.push(v);$("nsz").value="";$("sz-tags").innerHTML=p.sizes.map(s=>`<span class="tag">${esc(s)}<button class="tdel" onclick="rmTag('sz','${esc(s)}')">&#215;</button></span>`).join("")}
  else{const v=$("ndt")?.value?.trim();if(!v)return;if(!p.details)p.details=[];p.details.push(v);$("ndt").value="";$("dt-tags").innerHTML=p.details.map((d,i)=>`<span class="tag">${esc(d)}<button class="tdel" onclick="rmTag('dt',${i})">&#215;</button></span>`).join("")}
}
function rmTag(type,key){
  const p=S.modal?.data;if(!p)return;
  if(type==="sz"){p.sizes=(p.sizes||[]).filter(s=>s!==key);$("sz-tags").innerHTML=p.sizes.map(s=>`<span class="tag">${esc(s)}<button class="tdel" onclick="rmTag('sz','${esc(s)}')">&#215;</button></span>`).join("")}
  else{(p.details=p.details||[]).splice(key,1);$("dt-tags").innerHTML=p.details.map((d,i)=>`<span class="tag">${esc(d)}<button class="tdel" onclick="rmTag('dt',${i})">&#215;</button></span>`).join("")}
}
function addColor(){
  const p=S.modal?.data;if(!p)return;const name=$("ncn")?.value?.trim();if(!name)return;const hex=$("nch")?.value||"#ccc";
  if(!p.colors)p.colors=[];p.colors.push({name,hex});$("ncn").value="";
  $("cl-tags").innerHTML=p.colors.map(c=>`<span class="tag"><span class="csw" style="background:${c.hex}"></span>${esc(c.name)}<button class="tdel" onclick="rmColor('${esc(c.name)}')">&#215;</button></span>`).join("")
}
function rmColor(name){const p=S.modal?.data;if(!p)return;p.colors=(p.colors||[]).filter(c=>c.name!==name);$("cl-tags").innerHTML=p.colors.map(c=>`<span class="tag"><span class="csw" style="background:${c.hex}"></span>${esc(c.name)}<button class="tdel" onclick="rmColor('${esc(c.name)}')">&#215;</button></span>`).join("")}

function rebuildGrid(){
  const p=S.modal?.data;if(!p)return;
  $("igrid").innerHTML=p.images.map((img,i)=>`<div class="ic">${img.startsWith("/")?`<img src="${esc(img)}" loading="lazy"/>`:`<div class="iph">${esc(img)}</div>`}${i===0?`<div class="ml">Main Image</div>`:""}<button class="rm" onclick="rmImg(${i})">&#10005;</button></div>`).join("")+
    `<label class="iup"><input type="file" accept="image/*" multiple onchange="upImgs(this)"/>${IC.upl}<span>Upload more</span></label>`;
  $("pimgs").value=p.images.join(", ");
}
async function upImgs(input){
  const files=Array.from(input.files);if(!files.length)return;
  const p=S.modal?.data;if(!p)return;if(!p.images)p.images=[];
  toast("Uploading "+files.length+" image"+(files.length>1?"s":"")+"…","info");
  for(const file of files){try{const r=await A.up(file);if(r.url)p.images.push(r.url)}catch(e){toast("Failed: "+file.name,"err")}}
  rebuildGrid();toast("Done!")
}
function rmImg(i){const p=S.modal?.data;if(!p||!p.images)return;p.images.splice(i,1);rebuildGrid()}

async function saveProd(id){
  const name=$("pn")?.value?.trim(),price=parseFloat($("pprice")?.value);
  if(!name){toast("Product name required","err");return}if(!price){toast("Sell price required","err");return}
  const p=S.modal?.data||{};
  const imgs=$("pimgs")?.value?.split(",").map(s=>s.trim()).filter(Boolean)||[];
  const data={...p,name,price,costPrice:parseFloat($("pcost")?.value)||0,subtitle:$("psub")?.value||"",description:$("pdesc")?.value||"",originalPrice:parseFloat($("porig")?.value)||null,collection:$("pcol")?.value,badge:$("pbadge")?.value||null,images:imgs,featured:$("pfeat")?.checked||false,rating:parseFloat($("prat")?.value)||4.5,reviews:parseInt($("prev")?.value)||0};
  try{
    if(id!==null&&id!==undefined&&id!=="null"){const u=await A.pu("/products/"+id,data);S.products=S.products.map(p=>p.id===id?u:p);toast("Product updated ✓")}
    else{const c=await A.po("/products",data);S.products.push(c);toast("Product created ✓")}
    S.modal=null;render();
  }catch(e){toast("Failed to save","err")}
}
async function delProd(id){if(!confirm("Delete this product?"))return;try{await A.de("/products/"+id);S.products=S.products.filter(p=>p.id!==id);toast("Deleted");render()}catch(e){toast("Failed","err")}}
async function toggleFeat(id,val){try{await A.pu("/products/"+id,{featured:val});S.products=S.products.map(p=>p.id===id?{...p,featured:val}:p);toast(val?"Marked as featured":"Removed from featured")}catch(e){toast("Failed","err")}}

async function saveCat(eid){
  const label=$("cl")?.value?.trim();if(!label){toast("Name required","err");return}
  try{
    if(eid){const u=await A.pu("/categories/"+eid,{label});S.categories=S.categories.map(c=>c.id===eid?u:c);toast("Updated")}
    else{const id=$("ci")?.value?.trim()||undefined;const c=await A.po("/categories",{label,id});S.categories.push(c);toast("Created")}
    S.modal=null;render();
  }catch(e){toast("Failed","err")}
}
async function delCat(id){if(!confirm("Delete category "+id+"?"))return;try{await A.de("/categories/"+id);S.categories=S.categories.filter(c=>c.id!==id);toast("Deleted");render()}catch(e){toast("Failed","err")}}

async function updOrdSt(id,status){
  try{const u=await A.pu("/orders/"+id,{status});S.orders=S.orders.map(o=>o.id===id?u:o);toast("Order: "+status);
    if(S.modal?.type==="ord"){S.modal={type:"ord",data:id};render()}else rp();
  }catch(e){toast("Failed","err")}
}

function addT(){if(!S.homepage.testimonials)S.homepage.testimonials=[];S.homepage.testimonials.push({quote:"",author:"",role:"",product:"",rating:5});rp()}
function rmT(i){S.homepage.testimonials.splice(i,1);rp()}
async function saveHP(){
  const tels=$$(".tq").map((el,i)=>({quote:el.value,author:$$(".ta")[i]?.value||"",role:$$(".tr")[i]?.value||"",product:$$(".tp")[i]?.value||"",rating:5}));
  const hp={hero:{badge:$("hb")?.value||"",headline:$("hh")?.value||"",subtext:$("hs")?.value||"",ctaText:$("hc")?.value||"",ctaSecondary:$("hc2")?.value||""},marquee:$("hm")?.value?.split(",").map(s=>s.trim()).filter(Boolean)||[],testimonials:tels};
  try{const u=await A.pu("/homepage",hp);S.homepage=u;toast("Homepage saved — reload store to see ✓")}catch(e){toast("Failed","err")}
}

async function saveSet(){
  const s={storeName:$("sn")?.value||"AURAH",tagline:$("st")?.value||"",email:$("se")?.value||"",instagram:$("si")?.value||"",accentColor:$("sa")?.value||"#c9a85c",theme:$("sth")?.value||"dark",fontPair:$("sf")?.value||"cormorant",heroLayout:$("sh")?.value||"split",cardRadius:parseInt($("sr")?.value)||0,currencySymbol:$("sc")?.value||"$",freeShippingThreshold:parseFloat($("sfs")?.value)||150,shippingCost:parseFloat($("ssc")?.value)||18};
  try{const u=await A.pu("/settings",s);S.settings=u;toast("Settings saved — reload store to apply ✓")}catch(e){toast("Failed","err")}
}

function bindKeys(){
  document.onkeydown=e=>{if(e.key==="Escape"&&S.modal){S.modal=null;render()}};
  $("nsz")?.addEventListener("keydown",e=>{if(e.key==="Enter")addTag("sz")});
  $("ndt")?.addEventListener("keydown",e=>{if(e.key==="Enter")addTag("dt")});
  $("ncn")?.addEventListener("keydown",e=>{if(e.key==="Enter")addColor()});
  $("tkin")?.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}

render();
if(S.auth)loadAll();
</script>
